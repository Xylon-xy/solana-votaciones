<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Web3 Debate & Vote | Final</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #fff;
            display: flex; height: 100vh; margin: 0; overflow: hidden;
        }
        /* Sidebar Estilo Pro */
        #sidebar { 
            width: 280px; background: #0a0a0a; border-right: 1px solid #111; 
            padding: 25px; display: flex; flex-direction: column;
        }
        #sidebar h3 { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .historial-item { 
            background: #121212; padding: 12px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-size: 13px; border: 1px solid #1a1a1a; transition: 0.2s;
        }
        .historial-item:hover { border-color: #6200ea; background: #161616; }
        .btn-borrar { background: none; border: none; color: #333; cursor: pointer; font-size: 14px; }
        .btn-borrar:hover { color: #ff1744; transform: scale(1.2); }
        
        /* Main Layout */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .banner-debate {
            position: absolute; top: 40px; border: 1px solid #512da8; padding: 8px 25px; 
            border-radius: 50px; background: rgba(98, 0, 234, 0.05); color: #b39ddb; font-size: 12px;
            letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 0 20px rgba(98, 0, 234, 0.1);
        }

        .card { 
            background: #0f0f0f; padding: 40px; border-radius: 35px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.9); width: 420px; text-align: center; border: 1px solid #1a1a1a;
        }
        
        .admin-box { background: #161616; padding: 25px; border-radius: 25px; margin-bottom: 20px; border: 1px dashed #222; }
        input { width: 90%; padding: 15px; background: #000; border: 1px solid #222; border-radius: 15px; color: white; margin-bottom: 10px; outline: none; }
        
        .btn-p { background: #1a1a1a; color: #444; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: not-allowed; transition: 0.3s; }
        .activo { background: #6200ea !important; color: #fff !important; cursor: pointer !important; box-shadow: 0 5px 15px rgba(98, 0, 234, 0.3); }

        .pregunta-display { background: #000; padding: 25px; border-radius: 20px; display: none; margin-bottom: 20px; border: 1px solid #512da8; }
        
        /* BARRA DE CHOQUE */
        .duelo-container { 
            width: 100%; height: 14px; background: #1a1a1a; border-radius: 20px; 
            margin: 25px 0; display: none; overflow: hidden; position: relative; border: 1px solid #222;
        }
        #barra-si { 
            position: absolute; left: 0; top: 0; height: 100%; background: #00c853; 
            width: 50%; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2;
        }
        #barra-no { 
            position: absolute; right: 0; top: 0; height: 100%; background: #d50000; 
            width: 50%; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .votos-container { display: none; justify-content: space-between; margin-top: 10px; }
        .btn-v { width: 48%; padding: 18px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-v:active { transform: scale(0.9); }
        
        #marcador { margin-top: 20px; font-size: 28px; font-weight: 900; display: none; letter-spacing: -1px; }
        #btn-nueva { display: none; margin-top: 25px; background: none; border: 1px solid #222; color: #333; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Historial de Debates</h3>
        <div id="lista-historial"></div>
        <button onclick="if(confirm('¿Formatear base de datos?')) { localStorage.clear(); location.reload(); }" style="margin-top:auto; background:none; border:none; color:#222; cursor:pointer; font-size:9px;">RESETEAR SISTEMA</button>
    </div>

    <div id="main-content">
        <div class="banner-debate">🚀 Votación Descentralizada: Debate y Elige</div>

        <div class="card">
            <h2 style="margin-bottom: 30px; font-weight: 800; font-size: 20px;">BLOCKCHAIN DEBATE</h2>
            
            <div id="admin-panel" class="admin-box">
                <input type="text" id="input-pregunta" placeholder="¿Cuál es el tema de hoy?" oninput="validar()">
                <button id="btn-publicar" class="btn-p" disabled>LANZAR DEBATE</button>
            </div>

            <div id="pregunta-box" class="pregunta-display"><h3 id="texto-pregunta" style="margin:0; font-weight: 400; color: #eee;"></h3></div>

            <div id="voto-opciones" style="display: none;">
                <button id="btn-conectar" style="background:#fff; color:#000; padding:16px; border-radius:15px; width:100%; font-weight:bold; cursor:pointer; margin-bottom:12px; border:none;">🔗 Votar con Phantom</button>
                <button onclick="activarVotacion()" style="background:none; border:1px solid #222; color:#555; padding:12px; border-radius:15px; width:100%; cursor:pointer; font-size:11px;">Continuar como Invitado</button>
            </div>

            <div id="votos-cont" class="votos-container">
                <button onclick="votar('si')" style="background:#00c853;" class="btn-v">SÍ</button>
                <button onclick="votar('no')" style="background:#d50000;" class="btn-v">NO</button>
            </div>

            <div id="duelo-cont" class="duelo-container">
                <div id="barra-si"></div>
                <div id="barra-no"></div>
            </div>

            <div id="marcador">
                <span id="txt-si" style="color: #00c853;">0</span>
                <span style="color: #222; margin: 0 15px;">VS</span>
                <span id="txt-no" style="color: #ff1744;">0</span>
            </div>

            <button id="btn-nueva" onclick="resetearTodo()">+ NUEVA CONSULTA</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
